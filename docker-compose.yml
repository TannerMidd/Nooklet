name: nooklet

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: nooklet:local
    container_name: nooklet
    restart: unless-stopped
    ports:
      - "${APP_PORT:-42021}:42021"
    env_file:
      - .env
    environment:
      # Force the in-container DB path regardless of what's in .env so a host
      # path like ./data/nooklet.db doesn't accidentally land outside the
      # mounted volume.
      DATABASE_URL: file:/app/data/nooklet.db
    volumes:
      - nooklet-data:/app/data

volumes:
  nooklet-data:
